<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>StayBnB | Admin Dashboard</title>
    <style>
        body { font-family: sans-serif; padding: 40px; background: #f4f4f4; }
        .container { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #ff385c; color: white; }
        .status { color: green; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Admin Dashboard</h1>
        <table>
            <thead>
                <tr>
                    <th>Hotel Name</th>
                    <th>Price</th>
                    <th>Bookings</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Soneva Jani</td>
                    <td>$850</td>
                    <td>12</td>
                    <td class="status">Active</td>
                </tr>
                <tr>
                    <td>Aman Tokyo</td>
                    <td>$540</td>
                    <td>8</td>
                    <td class="status">Active</td>
                </tr>
            </tbody>
        </table>
        <br>
        <a href="/">Back to Home</a>
    </div>
</body>
</html>
