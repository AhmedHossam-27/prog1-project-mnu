<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>StayBnB | Luxury Stays</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #334155; --bg: #f8fafc; }
        body { font-family: 'Poppins', sans-serif; margin: 0; background: #fff; }
        nav { display: flex; justify-content: space-between; align-items: center; padding: 15px 8%; border-bottom: 1px solid #eee; position: sticky; top: 0; background: white; z-index: 1000; }
        .logo { color: var(--primary); font-size: 26px; font-weight: 800; text-decoration: none; }
        .user-info { display: flex; align-items: center; gap: 10px; border: 1px solid #ddd; padding: 5px 15px; border-radius: 25px; }
        .hero { padding: 50px 8%; background: var(--bg); text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px; padding: 40px 8%; }
        .card { border-radius: 15px; overflow: hidden; cursor: pointer; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); }
        .card img { width: 100%; height: 280px; object-fit: cover; border-radius: 15px; }
        .price { font-weight: 600; color: var(--primary); margin-top: 5px; }
    </style>
</head>
<body>

<nav>
    <a href="/" class="logo">StayBnB</a>
    <div style="display:flex; gap:20px; align-items:center;">
        <a href="/admin" style="text-decoration:none; color:#666;">Admin</a>
        {% if session.get('user') %}
            <div class="user-info">
                <span>{{ session['user'] }}</span>
                <i class="fa-solid fa-circle-user" style="font-size:24px; color:var(--primary);"></i>
                <a href="/logout" style="margin-left:10px; font-size:12px; color:red;">Logout</a>
            </div>
        {% else %}
            <a href="/login" class="user-info" style="text-decoration:none; color:inherit;">
                <i class="fa-solid fa-bars"></i>
                <i class="fa-solid fa-circle-user" style="font-size:24px; color:#ccc;"></i>
            </a>
        {% endif %}
    </div>
</nav>

<div class="hero">
    <h1>Welcome to World Class Stays</h1>
    <p>Hand-picked luxury hotels just for you.</p>
</div>

<div class="grid">
    {% for id, hotel in hotels.items() %}
    <div class="card" onclick="location.href='/hotel/{{ id }}'">
        <img src="{{ hotel.img }}" alt="{{ hotel.name }}">
        <div style="padding:10px 0;">
            <div style="display:flex; justify-content:space-between; font-weight:600;">
                <span>{{ hotel.name }}</span>
                <span>⭐ 4.9</span>
            </div>
            <div style="color:#717171; font-size:14px;">{{ hotel.location }}</div>
            <div class="price">${{ hotel.price }} <span>night</span></div>
        </div>
    </div>
    {% endfor %}
</div>

</body>
</html>
